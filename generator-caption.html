<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPA AI - Caption Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #020617; color: #f8fafc; }
        .font-m { font-family: 'Montserrat', sans-serif; }
        .bg-gold { background: linear-gradient(to right, #d97706, #f59e0b, #fbbf24); }
        .text-gold { color: #fbbf24; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center items-start">

    <div class="max-w-3xl w-full space-y-6">
        <!-- HEADER -->
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-3xl md:text-5xl font-black text-white font-m uppercase tracking-wide">
                <span class="text-gold">NPA TRI AI</span> Generator
            </h1>
            <p class="text-slate-400">Pabrik Caption Mesin Uang (Hook-Masalah-Solusi-CTA-Tag)</p>
        </div>

        <!-- MAIN FORM -->
        <div class="glass-panel p-6 md:p-8 rounded-3xl shadow-2xl space-y-6">
            
            <!-- Upload Gambar -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gold uppercase tracking-wider">1. Upload Gambar / Thumbnail (Opsional)</label>
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-slate-600 border-dashed rounded-2xl cursor-pointer bg-slate-800 hover:bg-slate-700 transition relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6" id="upload-placeholder">
                            <span class="text-4xl mb-2">📸</span>
                            <p class="mb-2 text-sm text-slate-400"><span class="font-bold">Klik untuk upload</span> atau drag & drop</p>
                        </div>
                        <input id="image-upload" type="file" class="hidden" accept="image/*" onchange="previewImage(event)" />
                        <img id="image-preview" class="absolute inset-0 w-full h-full object-contain hidden" />
                    </label>
                </div>
            </div>

            <!-- Konteks Bisnis -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gold uppercase tracking-wider">2. Konteks / Nama Produk</label>
                <input type="text" id="context" placeholder="Contoh: Jualan Kopi Juwara, Jasa Web Kuda Troya, dll..." class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 transition">
            </div>

            <!-- Style Dropdown -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gold uppercase tracking-wider">3. Gaya Bahasa (Style)</label>
                <div class="relative">
                    <select id="style" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:border-amber-500 transition">
                        <option value="FOMO (Menakut-nakuti agar prospek takut ketinggalan)">🔥 FOMO (Fear Of Missing Out)</option>
                        <option value="Pro & Kontra (Polarisasi, memancing perdebatan di kolom komentar)">⚔️ Pro & Kontra (Bikin Rame Komen)</option>
                        <option value="Story-Telling (Bercerita, menyentuh emosi, menginspirasi)">📖 Story-Telling (Sentuh Emosi)</option>
                        <option value="Sarkas / Nyinyir (Menyindir kebiasaan buruk prospek secara halus)">😏 Sarkas / Sindiran Halus</option>
                        <option value="Hard Selling (Langsung jualan to the point)">💰 Hard Selling (To The Point)</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none">
                        <span class="text-slate-400">▼</span>
                    </div>
                </div>
            </div>

            <!-- Tombol Generate -->
            <button onclick="generatePrompt()" class="w-full bg-gold hover:opacity-90 text-slate-900 font-black py-4 rounded-xl shadow-[0_0_20px_rgba(245,158,11,0.3)] transition-all uppercase tracking-widest text-lg font-m flex justify-center items-center gap-2">
                <span>🤖 Generate Super Prompt</span>
            </button>
        </div>

        <!-- OUTPUT AREA -->
        <div id="output-area" class="glass-panel p-6 md:p-8 rounded-3xl shadow-2xl hidden opacity-0 transition-opacity duration-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-emerald-400 font-m">✅ Prompt Siap Digunakan!</h2>
                <button onclick="copyToClipboard()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2">
                    📋 Copy Prompt
                </button>
            </div>
            <p class="text-sm text-slate-400 mb-3">Copy teks di bawah ini dan paste ke Beb (Gemini) atau ChatGPT untuk mendapatkan hasil caption yang instan!</p>
            <textarea id="result-prompt" readonly class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-4 text-slate-200 h-64 focus:outline-none resize-none"></textarea>
        </div>

    </div>

    <script>
        // Fungsi untuk Preview Gambar
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('image-preview');
                const placeholder = document.getElementById('upload-placeholder');
                output.src = reader.result;
                output.classList.remove('hidden');
                placeholder.classList.add('hidden');
            };
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        // Fungsi merakit Super Prompt
        function generatePrompt() {
            const context = document.getElementById('context').value;
            const style = document.getElementById('style').value;
            const outputArea = document.getElementById('output-area');
            const resultPrompt = document.getElementById('result-prompt');
            const imageUploaded = document.getElementById('image-upload').files.length > 0;

            if(!context) {
                alert("Siap Ndan! Tapi tolong isi kolom 'Konteks / Nama Produk' dulu ya biar AI-nya nggak bingung. 🫡");
                return;
            }

            let imageText = imageUploaded 
                ? "Saya akan melampirkan sebuah gambar. Tolong analisis gambar tersebut dan jadikan sebagai bahan utama untuk membuat HOOK dan MASALAH yang *relate* dengan visualnya." 
                : "Tidak ada gambar yang dilampirkan, buatkan narasi yang kuat berdasarkan konteks yang diberikan.";

            // Merakit Prompt Ajaib Ndan
            const finalPrompt = `Halo Asisten AI! Bertindaklah sebagai Expert Copywriter Spesialis FB PRO & Sosial Media.\n\nTugas kamu adalah membuat caption sosial media yang sangat menghipnotis (Ciamik) berdasarkan data berikut:\n\n1. KONTEKS BISNIS / PRODUK: "${context}"\n2. GAYA BAHASA (STYLE): ${style}\n3. KONDISI VISUAL: ${imageText}\n\nSTRUKTUR WAJIB (Jangan diubah):\n[HOOK] : 1-2 kalimat awal yang bikin orang berhenti scrolling (wajib nendang/bikin kaget).\n[MASALAH] : Jabarkan rasa sakit, keresahan, atau kerugian yang dialami target market saat ini.\n[SOLUSI] : Masukkan penawaran produk/jasa saya secara elegan sebagai obat dari masalah tersebut.\n[CTA] : Kalimat Call To Action yang jelas (arahkan untuk klik link di bio / komen).\n[TAG] : Berikan 5-7 hashtag yang tertarget.\n\nBuatlah formatting-nya rapi, gunakan emoji yang pas, dan pastikan paragrafnya tidak terlalu rapat agar enak dibaca di HP. Gas!`;

            resultPrompt.value = finalPrompt;
            
            // Animasi memunculkan output
            outputArea.classList.remove('hidden');
            setTimeout(() => {
                outputArea.classList.remove('opacity-0');
            }, 50);

            // Scroll ke bawah
            outputArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Fungsi Copy
        function copyToClipboard() {
            const copyText = document.getElementById("result-prompt");
            copyText.select();
            copyText.setSelectionRange(0, 99999); /* Untuk HP */
            navigator.clipboard.writeText(copyText.value);
            alert("Lapor Ndan! Prompt sudah berhasil di-copy ke Clipboard. Tinggal paste ke Beb! 🫡🚀");
        }
    </script>
</body>
</html>
