<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kartu E-Toll NPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Tambahan Font Share Tech Mono untuk efek font Kartu Kredit -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* Font khusus mirip cetakan kartu kredit */
        .font-cc { font-family: 'Share Tech Mono', monospace; }

        .card-container {
            width: 600px;
            height: 380px;
            min-width: 600px;
            min-height: 380px;
            background: radial-gradient(circle at 50% 50%, #1e1e1e 0%, #000000 100%);
            border: 1px solid #333;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .chip {
            width: 55px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #fef08a 0%, #ca8a04 100%);
            border: 1px solid #713f12;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 1px;
            padding: 2px;
        }
        .chip div { border: 1px solid rgba(113, 63, 18, 0.4); border-radius: 2px; }

        /* Emboss Silver yang tajam */
        .silver-emboss {
            color: #f1f5f9; 
            text-shadow: 
                -1px -1px 0px rgba(255, 255, 255, 0.8),
                1px 1px 1px rgba(0, 0, 0, 1),
                2px 2px 2px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px; /* Dikasih jarak biar makin mirip CC font */
        }

        .photo-frame {
            width: 105px;
            height: 125px;
            border-radius: 8px;
            border: 2px solid #94a3b8;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            background-color: #334155;
        }

        .text-silver { color: #cbd5e1; }
        #scaleWrapper { transform-origin: top center; transition: transform 0.1s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <div class="text-center mb-6 mt-4">
        <h1 class="text-2xl font-bold text-slate-300 mb-1">💳 Mesin Cetak ID / E-Toll NPA</h1>
        <p class="text-gray-400 text-sm">Credit Card Font Edition</p>
    </div>

    <!-- PANEL INPUT FORM -->
    <div class="bg-slate-800 p-6 rounded-xl shadow-lg w-full max-w-xl mb-8 border border-slate-700">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">NAMA MEMBER</label>
                <input type="text" id="inputName" placeholder="Contoh: KURNIAWAN" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white uppercase focus:border-slate-400 focus:outline-none" oninput="updateCard()">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">ID MEMBER</label>
                <input type="text" id="inputId" placeholder="Contoh: 0000 2206 1970" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white focus:border-slate-400 focus:outline-none" oninput="updateCard()">
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">LEVEL MEMBER</label>
                <select id="inputLevel" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white focus:border-slate-400 focus:outline-none" onchange="updateCard()">
                    <option value="SILVER MEMBER" selected>Silver</option>
                    <option value="GOLD MEMBER">Gold</option>
                    <option value="PREMIUM MEMBER">Premium</option>
                    <option value="VVIP MEMBER">VVIP</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">FOTO MEMBER</label>
                <input type="file" id="inputPhoto" accept="image/*" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-1.5 text-sm text-gray-400 file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:font-bold file:bg-slate-300 file:text-slate-900 hover:file:bg-slate-200" onchange="loadPhoto(event)">
            </div>
        </div>
        <button onclick="downloadCard()" class="w-full bg-gradient-to-r from-slate-300 to-slate-400 hover:from-slate-200 hover:to-slate-300 text-slate-900 font-black py-4 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 uppercase tracking-widest">
            <span>📥 DOWNLOAD KARTU (PNG)</span>
        </button>
    </div>

    <!-- PREVIEW KARTU -->
    <div class="w-full flex justify-center pb-10 overflow-hidden">
        <div id="flexWrapper" style="position: relative;">
            <div id="scaleWrapper">
                
                <!-- KARTU ASLI -->
                <div id="vvipCard" class="card-container p-8 z-10 shrink-0">
                    
                    <!-- Background Daun Kelapa SVG -->
                    <svg class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-[0.18]" viewBox="0 0 600 380" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M -50,420 Q 300,190 650,-50" stroke="white" stroke-width="6"/>
                        <path d="M 50,348 Q 150,200 300,150" stroke="white" stroke-width="2"/>
                        <path d="M 150,285 Q 250,150 400,100" stroke="white" stroke-width="2"/>
                        <path d="M 250,221 Q 350,100 500,50" stroke="white" stroke-width="2"/>
                        <path d="M 350,158 Q 450,50 600,20" stroke="white" stroke-width="2"/>
                        <path d="M 450,95 Q 550,0 650,-20" stroke="white" stroke-width="2"/>
                        <path d="M 100,316 Q 200,370 350,390" stroke="white" stroke-width="2"/>
                        <path d="M 200,253 Q 300,310 450,340" stroke="white" stroke-width="2"/>
                        <path d="M 300,190 Q 400,250 550,290" stroke="white" stroke-width="2"/>
                        <path d="M 400,126 Q 500,190 650,240" stroke="white" stroke-width="2"/>
                        <path d="M 500,63 Q 600,130 700,190" stroke="white" stroke-width="2"/>
                    </svg>

                    <!-- KIRI ATAS: Icon Contactless & Text -->
                    <div class="absolute top-8 left-[40px] z-20 flex flex-col items-center opacity-70">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
                            <path d="M8 4a16 16 0 0 1 0 16"></path>
                            <path d="M12 7a10 10 0 0 1 0 10"></path>
                            <path d="M16 10a5 5 0 0 1 0 4"></path>
                        </svg>
                        <span class="text-[7px] font-bold tracking-[0.15em] text-slate-300">SMART CARD</span>
                    </div>

                    <!-- TOP CENTER: Logo NPA -->
                    <div class="absolute top-6 left-1/2 transform -translate-x-1/2 text-center z-20 w-full flex flex-col items-center">
                        <div class="flex justify-center items-center gap-1">
                            <h1 class="text-[38px] font-black tracking-tighter text-yellow-500" style="text-shadow: 0 4px 6px rgba(0,0,0,0.8);">NPA</h1>
                        </div>
                        <h2 class="text-[10px] font-bold tracking-[0.3em] text-yellow-400 mt-1 mb-1">SMART SYSTEM</h2>
                        <h3 class="text-[7px] font-bold tracking-[0.2em] text-silver">NGANGGUR PRENEUR AKADEMI</h3>
                    </div>

                    <!-- KIRI TENGAH: Chip Kuning Emas -->
                    <div class="chip absolute top-[160px] left-[40px] z-20">
                        <div></div><div></div><div></div>
                        <div></div><div></div><div></div>
                        <div></div><div></div><div></div>
                    </div>

                    <!-- KANAN ATAS: Foto dengan Label Menumpuk -->
                    <div class="absolute top-8 right-[40px] z-20 flex flex-col items-center relative">
                        <img id="cardPhoto" src="https://via.placeholder.com/150/334155/cbd5e1?text=FOTO" class="photo-frame" alt="Foto">
                        <!-- Label Level ditaruh numpuk (absolute) di bagian bawah frame foto -->
                        <div id="cardLevel" class="absolute -bottom-3 bg-gradient-to-r from-slate-800 to-slate-900 border border-slate-600 text-slate-200 text-[9px] font-bold tracking-[0.2em] px-3 py-1.5 rounded-full shadow-[0_4px_6px_rgba(0,0,0,0.8)] uppercase whitespace-nowrap">
                            SILVER MEMBER
                        </div>
                    </div>

                    <!-- KIRI BAWAH: Nama & ID (Credit Card Font) -->
                    <div class="absolute bottom-8 left-[40px] z-30">
                        <p class="text-[9px] font-bold tracking-[0.2em] text-gray-500 mb-1 uppercase">Nama Member</p>
                        <!-- Menggunakan font-cc (Share Tech Mono) -->
                        <p id="cardName" class="font-cc text-[24px] uppercase mb-4 silver-emboss truncate w-[350px]">
                            KURNIAWAN
                        </p>
                        
                        <p class="text-[9px] font-bold tracking-[0.2em] text-gray-500 mb-1 uppercase">ID Member</p>
                        <!-- Menggunakan font-cc (Share Tech Mono) -->
                        <p id="cardId" class="font-cc text-[22px] silver-emboss">
                            0000 2206 1970
                        </p>
                    </div>

                    <!-- KANAN BAWAH: Motto Silver -->
                    <div class="absolute bottom-6 right-[40px] z-20 text-[8px] tracking-[0.2em] text-slate-400 font-bold opacity-80" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">
                        BERJUANG • BERKARYA • BERKAH
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        function adjustScale() {
            const flexWrapper = document.getElementById('flexWrapper');
            const wrapper = document.getElementById('scaleWrapper');
            const cardWidth = 600;
            const cardHeight = 380;
            const screenWidth = window.innerWidth - 32; 
            
            if (screenWidth < cardWidth) {
                const scaleValue = screenWidth / cardWidth; 
                wrapper.style.transform = `scale(${scaleValue})`;
                flexWrapper.style.width = `${cardWidth * scaleValue}px`;
                flexWrapper.style.height = `${cardHeight * scaleValue}px`; 
            } else {
                wrapper.style.transform = 'scale(1)';
                flexWrapper.style.width = `${cardWidth}px`;
                flexWrapper.style.height = `${cardHeight}px`;
            }
        }

        window.onload = adjustScale;
        window.addEventListener('resize', adjustScale);

        // Update Text
        function updateCard() {
            // Karena font CC lebih cocok huruf besar, saya hapus fungsi toTitleCase
            const rawName = document.getElementById('inputName').value;
            document.getElementById('cardName').innerText = rawName ? rawName : 'KURNIAWAN';
            
            const idVal = document.getElementById('inputId').value;
            document.getElementById('cardId').innerText = idVal ? idVal : '0000 2206 1970';

            const levelVal = document.getElementById('inputLevel').value;
            document.getElementById('cardLevel').innerText = levelVal;
        }

        // Upload & Tampilkan Foto
        function loadPhoto(event) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('cardPhoto').src = reader.result;
            };
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        // Fitur Download HTML to PNG
        function downloadCard() {
            const card = document.getElementById('vvipCard');
            const wrapper = document.getElementById('scaleWrapper');
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ SEDANG MEMPROSES...';
            
            const currentTransform = wrapper.style.transform;
            wrapper.style.transform = 'scale(1)';
            
            setTimeout(() => {
                html2canvas(card, {
                    scale: 3, 
                    backgroundColor: "#000000",
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    wrapper.style.transform = currentTransform;

                    const link = document.createElement('a');
                    link.download = `E-Toll-Card-${document.getElementById('inputName').value || 'NPA'}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    
                    btn.innerHTML = '✅ BERHASIL DIUNDUH!';
                    btn.classList.replace('bg-gradient-to-r', 'bg-green-500');
                    btn.classList.remove('from-slate-300', 'to-slate-400');

                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.add('bg-gradient-to-r', 'from-slate-300', 'to-slate-400');
                        btn.classList.remove('bg-green-500');
                    }, 3000);
                }).catch(err => {
                    wrapper.style.transform = currentTransform;
                    console.error("Gagal cetak kartu:", err);
                    alert("Gagal memproses gambar. Coba lagi.");
                });
            }, 150); 
        }
    </script>
</body>
</html>
