<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Kartu NPA - All In One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* Container Kartu Fix */
        .card-container {
            width: 600px;
            height: 380px;
            min-width: 600px;
            min-height: 380px;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
            border: 1px solid #333;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(251, 191, 36, 0.1);
        }

        /* Ornamen Garis Emas */
        .gold-sweep {
            position: absolute;
            bottom: -80px;
            right: -20px;
            width: 400px;
            height: 200px;
            border-top: 6px solid #fbbf24;
            border-radius: 50%;
            transform: rotate(-20deg);
            box-shadow: 0 -10px 30px rgba(251, 191, 36, 0.3);
            opacity: 0.8;
            pointer-events: none;
        }

        /* Desain Chip */
        .chip {
            width: 55px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #fef08a 0%, #ca8a04 100%);
            border: 1px solid #713f12;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 1px;
            padding: 2px;
        }
        .chip div { border: 1px solid rgba(113, 63, 18, 0.4); border-radius: 2px; }

        /* Warna Silver */
        .text-silver { color: #cbd5e1; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        /* Gold Emboss 3D */
        .gold-emboss {
            color: #fbbf24;
            text-shadow: 
                -1px -1px 0px #fef08a, 
                1px 1px 0px #b45309,  
                2px 2px 4px rgba(0,0,0,0.9), 
                3px 3px 8px rgba(0,0,0,0.7);
        }

        /* Frame Foto */
        .photo-frame {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            border: 3px solid #fbbf24;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3);
            background-color: #1e293b;
        }

        #scaleWrapper { transform-origin: top center; transition: transform 0.1s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <div class="text-center mb-6 mt-4">
        <h1 class="text-2xl font-bold text-yellow-400 mb-1">💳 Mesin Cetak Kartu NPA</h1>
        <p class="text-gray-400 text-sm">Anti-Numpuk & Anti-Error (1 File Only)</p>
    </div>

    <!-- PANEL INPUT FORM -->
    <div class="bg-slate-800 p-6 rounded-xl shadow-lg w-full max-w-xl mb-8 border border-slate-700">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-bold text-yellow-500 mb-1">NAMA MEMBER</label>
                <input type="text" id="inputName" placeholder="Contoh: Sugiarto Kurniawan" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white uppercase focus:border-yellow-400 focus:outline-none" oninput="updateCard()">
            </div>
            <div>
                <label class="block text-sm font-bold text-yellow-500 mb-1">ID / NOMOR WA</label>
                <input type="text" id="inputId" placeholder="Contoh: 0000 2206 1970" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white uppercase focus:border-yellow-400 focus:outline-none" oninput="updateCard()">
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-bold text-yellow-500 mb-1">LEVEL MEMBER</label>
                <select id="inputLevel" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white focus:border-yellow-400 focus:outline-none" onchange="updateCard()">
                    <option value="SILVER MEMBER">Silver</option>
                    <option value="GOLD MEMBER">Gold</option>
                    <option value="PREMIUM MEMBER">Premium</option>
                    <option value="VVIP MEMBER" selected>VVIP</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-yellow-500 mb-1">FOTO MEMBER</label>
                <input type="file" id="inputPhoto" accept="image/*" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-1.5 text-sm text-gray-400 file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:font-bold file:bg-yellow-400 file:text-slate-900 hover:file:bg-yellow-500" onchange="loadPhoto(event)">
            </div>
        </div>
        <button onclick="downloadCard()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-slate-900 font-black py-4 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 uppercase tracking-widest">
            <span>📥 DOWNLOAD KARTU (PNG)</span>
        </button>
    </div>

    <!-- PREVIEW KARTU -->
    <div class="w-full flex justify-center pb-10 overflow-hidden">
        <div id="flexWrapper" style="position: relative;">
            <div id="scaleWrapper">
                
                <!-- KARTU ASLI -->
                <div id="vvipCard" class="card-container p-8 z-10 shrink-0 flex flex-col justify-between">
                    <div class="gold-sweep"></div>
                    
                    <!-- Top Section: Logo (Kiri) & Foto (Kanan) -->
                    <div class="flex justify-between items-start z-20 relative">
                        <!-- Kiri: Logo & Chip -->
                        <div>
                            <div class="flex items-center gap-1">
                                <h1 class="text-[40px] font-black tracking-tighter text-yellow-500" style="text-shadow: 0 4px 6px rgba(0,0,0,0.8);">NPA</h1>
                                <div class="text-yellow-500 text-lg font-bold -mt-6 ml-[-10px] transform rotate-45">↗</div>
                            </div>
                            <h2 class="text-[11px] font-bold tracking-[0.3em] text-yellow-400 -mt-2 mb-1">SMART SYSTEM</h2>
                            <h3 class="text-[7px] font-bold tracking-[0.2em] text-silver mb-4">NGANGGUR PRENEUR AKADEMI</h3>
                            
                            <!-- Chip -->
                            <div class="chip">
                                <div></div><div></div><div></div>
                                <div></div><div></div><div></div>
                                <div></div><div></div><div></div>
                            </div>
                        </div>

                        <!-- Kanan: Foto Profil -->
                        <div class="text-right flex flex-col items-end">
                            <img id="cardPhoto" src="https://via.placeholder.com/150/1e293b/fbbf24?text=FOTO" class="photo-frame mb-2" alt="Foto">
                            <div id="cardLevel" class="bg-yellow-500 text-slate-900 text-[10px] font-bold px-3 py-1 rounded shadow-md uppercase tracking-widest">
                                VVIP MEMBER
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Section: Nama & ID (Terlindungi dari Overlap) -->
                    <div class="z-30 relative mt-4">
                        <p class="text-[10px] font-bold tracking-widest text-yellow-600 mb-1">NAMA MEMBER</p>
                        <!-- max-width & truncate mencegah teks nabrak nabrak -->
                        <p id="cardName" class="text-[26px] font-black uppercase mb-3 gold-emboss truncate w-[450px]">
                            SUGIARTO KURNIAWAN
                        </p>
                        
                        <p class="text-[10px] font-bold tracking-widest text-yellow-600 mb-1">ID MEMBER</p>
                        <p id="cardId" class="text-[22px] font-medium tracking-widest gold-emboss font-serif italic">
                            0000 2206 1970
                        </p>
                    </div>

                    <!-- Watermark / Slogan -->
                    <div class="absolute bottom-4 right-6 z-20 text-[7px] tracking-[0.2em] text-gray-500 font-medium">
                        SISTEM CERDAS • BISNIS BERKELAS
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Fitur Auto-Scale biar kartu tampil pas di HP
        function adjustScale() {
            const flexWrapper = document.getElementById('flexWrapper');
            const wrapper = document.getElementById('scaleWrapper');
            const cardWidth = 600;
            const cardHeight = 380;
            
            const screenWidth = window.innerWidth - 32; 
            
            if (screenWidth < cardWidth) {
                const scaleValue = screenWidth / cardWidth; 
                wrapper.style.transform = `scale(${scaleValue})`;
                flexWrapper.style.width = `${cardWidth * scaleValue}px`;
                flexWrapper.style.height = `${cardHeight * scaleValue}px`; 
            } else {
                wrapper.style.transform = 'scale(1)';
                flexWrapper.style.width = `${cardWidth}px`;
                flexWrapper.style.height = `${cardHeight}px`;
            }
        }

        window.onload = adjustScale;
        window.addEventListener('resize', adjustScale);

        // Update Text & Level
        function updateCard() {
            const name = document.getElementById('inputName').value;
            document.getElementById('cardName').innerText = name ? name : 'SUGIARTO KURNIAWAN';
            
            const idVal = document.getElementById('inputId').value;
            document.getElementById('cardId').innerText = idVal ? idVal : '0000 2206 1970';

            const levelVal = document.getElementById('inputLevel').value;
            document.getElementById('cardLevel').innerText = levelVal;
        }

        // Upload & Tampilkan Foto
        function loadPhoto(event) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('cardPhoto').src = reader.result;
            };
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        // Fitur Download HTML to PNG
        function downloadCard() {
            const card = document.getElementById('vvipCard');
            const wrapper = document.getElementById('scaleWrapper');
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ SEDANG MEMPROSES...';
            
            // Kembalikan scale ke 1 biar resolusi gambarnya jernih
            const currentTransform = wrapper.style.transform;
            wrapper.style.transform = 'scale(1)';
            
            setTimeout(() => {
                html2canvas(card, {
                    scale: 3, // Skala 3 untuk High Definition (HD)
                    backgroundColor: "#000000",
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    wrapper.style.transform = currentTransform;

                    const link = document.createElement('a');
                    link.download = `ID-Card-${document.getElementById('inputName').value || 'NPA'}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    
                    btn.innerHTML = '✅ BERHASIL DIUNDUH!';
                    btn.classList.add('bg-emerald-500');

                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-emerald-500');
                    }, 3000);
                }).catch(err => {
                    wrapper.style.transform = currentTransform;
                    console.error("Gagal cetak kartu:", err);
                    alert("Gagal memproses gambar. Coba lagi.");
                });
            }, 150); 
        }
    </script>
</body>
    </html>
